<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | Order summary card</title>
 <link rel="stylesheet" href="style.css">
</head>
<body>


  <main class="container">

    <div class="img-container">
      <img src="./images/illustration-hero.svg" alt="illustration-hero" width="100%">
    </div>

    <h1 class="heading">Order Summary</h1>
    <p class="description">
  You can now listen to millions of songs, audiobooks, and podcasts on any 
  device anywhere you like!</p>

  <div class="annualplan-container">
    <img src="images/icon-music.svg" alt="">
    <div class="plan">
      <h2 class="plan-heading">Annual Plan</h2>
      <p class="plan-description">$59.99/year</p>
    </div>
    <a href="" class="change-link">Change</a>
  </div>

  <button class="proceed-btn">Proceed to Payment</button>
  <button class="cancel-btn">Cancel Order</button>
  </main>

</body>
</html>
